<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>重匹配 - 选择卡纸试卷</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ===== 提示横幅 ===== */
.rematch-banner {
  margin: 0 16px 12px;
  padding: 12px 14px;
  background: var(--warning-light);
  border: 1px solid #FCD34D;
  border-radius: 12px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.rematch-banner__icon { font-size: 20px; flex-shrink: 0; }
.rematch-banner__title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.rematch-banner__desc { font-size: 12px; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }

/* ===== 试卷展示区 ===== */
.paper-viewer {
  position: relative;
  padding: 0 16px;
  margin-top: 8px;
}

.paper-card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  position: relative;
}

/* 左上角紫色序号 */
.paper-card__seq {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 10;
  background: var(--primary);
  color: white;
  font-size: 13px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 8px;
  min-width: 32px;
  text-align: center;
}

/* 右上角红色勾选圆点 */
.paper-card__check {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 10;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: white;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: transparent;
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.paper-card__check--checked {
  background: var(--danger);
  border-color: var(--danger);
  color: white;
}

.paper-card__check:active {
  transform: scale(0.92);
}

/* 试卷图片区域 */
.paper-card__image {
  width: 100%;
  aspect-ratio: 3/4;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 80px;
  position: relative;
}

.paper-card__image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 学生信息 */
.paper-card__info {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid var(--border);
}

.paper-card__name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.paper-card__detail {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* 左右翻页箭头 */
.paper-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 20;
  -webkit-tap-highlight-color: transparent;
}

.paper-nav:active { background: rgba(0,0,0,0.6); }

.paper-nav--prev { left: 4px; }
.paper-nav--next { right: 4px; }

.paper-nav:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* 页码跳转 */
.paper-pagination {
  text-align: center;
  margin-top: 16px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.paper-pagination__input {
  width: 48px;
  height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  background: white;
  outline: none;
  padding: 0;
}

.paper-pagination__input:focus {
  border-color: var(--primary);
}

.paper-pagination__total {
  color: var(--text-secondary);
  font-weight: 400;
}

/* 底部摘要 */
.bottom-summary-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 16px;
  margin: 12px 16px 0;
  background: var(--primary-fade);
  border-radius: 12px;
  font-size: 13px;
  color: var(--primary);
}

.bottom-summary-bar strong {
  font-weight: 600;
}

/* 已选中试卷缩略图条 */
.selected-strip {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.selected-strip::-webkit-scrollbar { display: none; }

.selected-thumb {
  width: 48px;
  height: 64px;
  border-radius: 8px;
  background: var(--bg-page);
  border: 2px solid var(--danger);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  position: relative;
}

.selected-thumb__seq {
  position: absolute;
  top: 2px;
  left: 2px;
  font-size: 10px;
  font-weight: 700;
  color: var(--danger);
  background: white;
  border-radius: 4px;
  padding: 0 4px;
}

/* 底部按钮组 */
.bottom-actions--split {
  display: flex;
  gap: 12px;
  padding: 12px 16px 24px;
}

.bottom-actions--split .btn {
  flex: 1;
}
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>16:15</span>
    <span>📶 5G 🔋</span>
  </div>

  <header class="app-bar">
    <button class="app-bar__back" onclick="history.back()">←</button>
    <h1 class="app-bar__title">重匹配</h1>
    <div class="app-bar__actions">
      <button class="app-bar__more">⋮</button>
    </div>
  </header>

  <!-- 提示横幅 -->
  <div class="rematch-banner">
    <span class="rematch-banner__icon">💡</span>
    <div>
      <div class="rematch-banner__title">请勾选被卡纸的试卷</div>
      <div class="rematch-banner__desc">点击右上角红色圆点勾选被卡住的试卷</div>
    </div>
  </div>

  <!-- 试卷展示区 -->
  <div class="paper-viewer">
    <div class="paper-card" id="paperCard" onclick="toggleCurrent()">
      <!-- 左上角紫色序号 -->
      <div class="paper-card__seq" id="cardSeq">1</div>
      <!-- 右上角红色勾选 -->
      <div class="paper-card__check" id="cardCheck">✓</div>
      <!-- 试卷图片 -->
      <div class="paper-card__image" id="cardImage">📄</div>
      <!-- 学生信息 -->
      <div class="paper-card__info">
        <div>
          <div class="paper-card__name" id="cardName">林晓雨</div>
          <div class="paper-card__detail" id="cardDetail">学号：250501</div>
        </div>
        <div id="cardTag"><span class="tag tag--success">已打印</span></div>
      </div>
    </div>

    <!-- 左右翻页 -->
    <button class="paper-nav paper-nav--prev" id="prevBtn" onclick="prevPaper()">‹</button>
    <button class="paper-nav paper-nav--next" id="nextBtn" onclick="nextPaper()">›</button>
  </div>

  <!-- 页码跳转 -->
  <div class="paper-pagination">
    <input class="paper-pagination__input" id="pageInput" type="number" min="1" max="10" value="1" onkeydown="onPageInputKey(event)" onblur="onPageInputBlur()">
    <span class="paper-pagination__total">/ <span id="pageTotal">10</span></span>
  </div>

  <!-- 选中摘要 -->
  <div class="bottom-summary-bar" id="summaryBar">
    已勾选 <strong id="selectedNum">0</strong> 张被卡纸试卷
  </div>

  <!-- 已选中缩略图条 -->
  <div class="selected-strip" id="selectedStrip"></div>

  <!-- 底部操作 -->
  <div class="bottom-actions bottom-actions--split">
    <button class="btn btn--secondary" onclick="toggleCurrent()">勾选当前试卷</button>
    <button class="btn btn--primary" id="nextStepBtn" disabled onclick="goToConfirm()">下一步</button>
  </div>
</div>

<script>
// 模拟试卷数据
const papers = [
  { id: 1, seq: 1, name: "林晓雨", studentNo: "250501", printed: true, jammed: false },
  { id: 2, seq: 2, name: "陈宇轩", studentNo: "250502", printed: true, jammed: false },
  { id: 3, seq: 3, name: "王思琪", studentNo: "250503", printed: true, jammed: false },
  { id: 4, seq: 4, name: "张浩然", studentNo: "250504", printed: true, jammed: false },
  { id: 5, seq: 5, name: "李欣怡", studentNo: "250505", printed: false, jammed: true },
  { id: 6, seq: 6, name: "刘子墨", studentNo: "250506", printed: false, jammed: false },
  { id: 7, seq: 7, name: "赵雅婷", studentNo: "250507", printed: false, jammed: false },
  { id: 8, seq: 8, name: "周明辉", studentNo: "250508", printed: false, jammed: false },
  { id: 9, seq: 9, name: "孙雨萱", studentNo: "250509", printed: false, jammed: false },
  { id: 10, seq: 10, name: "吴俊杰", studentNo: "250510", printed: false, jammed: false },
];

let currentIndex = 0;
let selectedIds = new Set();

// 自动勾选被卡纸的试卷及之后的所有
function autoSelectAfterJam() {
  const jamIndex = papers.findIndex(p => p.jammed);
  if (jamIndex >= 0) {
    currentIndex = jamIndex;
    for (let i = jamIndex; i < papers.length; i++) {
      selectedIds.add(papers[i].id);
    }
  }
  renderCard();
  updateSummary();
}

function renderCard() {
  const paper = papers[currentIndex];
  const isChecked = selectedIds.has(paper.id);

  document.getElementById('cardSeq').textContent = paper.seq;
  document.getElementById('cardName').textContent = paper.name;
  document.getElementById('cardDetail').textContent = `学号：${paper.studentNo}`;

  const checkEl = document.getElementById('cardCheck');
  if (isChecked) {
    checkEl.classList.add('paper-card__check--checked');
  } else {
    checkEl.classList.remove('paper-card__check--checked');
  }

  // 状态标签
  let tagHtml = '';
  if (paper.printed) {
    tagHtml = '<span class="tag tag--success">已打印</span>';
  } else if (paper.jammed) {
    tagHtml = '<span class="tag tag--danger">卡纸</span>';
  } else {
    tagHtml = '<span class="tag tag--primary">待打印</span>';
  }
  document.getElementById('cardTag').innerHTML = tagHtml;

  // 页码输入框
  const inputEl = document.getElementById('pageInput');
  inputEl.value = paper.seq;
  inputEl.max = papers.length;
  document.getElementById('pageTotal').textContent = papers.length;

  // 翻页按钮状态
  document.getElementById('prevBtn').disabled = currentIndex === 0;
  document.getElementById('nextBtn').disabled = currentIndex === papers.length - 1;
}

function toggleCurrent() {
  const paper = papers[currentIndex];
  if (selectedIds.has(paper.id)) {
    selectedIds.delete(paper.id);
  } else {
    selectedIds.add(paper.id);
  }
  renderCard();
  updateSummary();
}

function prevPaper() {
  if (currentIndex > 0) {
    currentIndex--;
    renderCard();
  }
}

function nextPaper() {
  if (currentIndex < papers.length - 1) {
    currentIndex++;
    renderCard();
  }
}

function updateSummary() {
  const selectedCount = selectedIds.size;
  document.getElementById('selectedNum').textContent = selectedCount;

  const nextBtn = document.getElementById('nextStepBtn');
  nextBtn.disabled = selectedCount === 0;

  // 更新缩略图条
  const strip = document.getElementById('selectedStrip');
  const selectedPapers = papers.filter(p => selectedIds.has(p.id));
  if (selectedPapers.length === 0) {
    strip.innerHTML = '';
    strip.style.display = 'none';
  } else {
    strip.style.display = 'flex';
    strip.innerHTML = selectedPapers.map(p => `
      <div class="selected-thumb">
        <span class="selected-thumb__seq">${p.seq}</span>
        📄
      </div>
    `).join('');
  }
}

function goToConfirm() {
  window.location.href = 'confirm-print.html';
}

function onPageInputKey(e) {
  if (e.key === 'Enter') {
    onPageInputBlur();
  }
}

function onPageInputBlur() {
  const inputEl = document.getElementById('pageInput');
  let val = parseInt(inputEl.value, 10);
  if (isNaN(val)) {
    inputEl.value = papers[currentIndex].seq;
    return;
  }
  val = Math.max(1, Math.min(papers.length, val));
  inputEl.value = val;
  currentIndex = papers.findIndex(p => p.seq === val);
  if (currentIndex < 0) currentIndex = val - 1;
  renderCard();
}

// 键盘支持
 document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') prevPaper();
  if (e.key === 'ArrowRight') nextPaper();
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    toggleCurrent();
  }
});

// 触摸滑动支持
let touchStartX = 0;
const card = document.getElementById('paperCard');
card.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
});
card.addEventListener('touchend', (e) => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) nextPaper();
    else prevPaper();
  }
});

// 初始化
autoSelectAfterJam();
</script>

</body>
</html>
