<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>重匹配 - 选择续打起点</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ===== 提示横幅 ===== */
.rematch-banner {
  margin: 0 16px 12px;
  padding: 12px 14px;
  background: var(--primary-fade);
  border: 1px solid #C7D2FE;
  border-radius: 12px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.rematch-banner__icon { font-size: 20px; flex-shrink: 0; }
.rematch-banner__title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.rematch-banner__desc { font-size: 12px; color: var(--text-secondary); margin-top: 3px; line-height: 1.5; }

/* ===== 试卷缩略图网格 ===== */
.paper-grid {
  padding: 0 16px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding-bottom: 120px; /* 为底部按钮留空间 */
}

.paper-thumb {
  position: relative;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  cursor: pointer;
  transition: all 0.15s ease;
  border: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
}

.paper-thumb:active {
  transform: scale(0.96);
}

.paper-thumb--selected {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15), 0 2px 8px rgba(0,0,0,0.06);
}

/* 左上角序号角标 */
.paper-thumb__seq {
  position: absolute;
  top: 6px;
  left: 6px;
  z-index: 10;
  background: var(--primary);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 6px;
  line-height: 1.4;
}

/* 缩略图图片区域 */
.paper-thumb__image {
  width: 100%;
  aspect-ratio: 3/4;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}

/* 选中标记（右上角勾） */
.paper-thumb__check {
  position: absolute;
  top: 6px;
  right: 6px;
  z-index: 10;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.2s ease;
}

.paper-thumb--selected .paper-thumb__check {
  opacity: 1;
  transform: scale(1);
}

/* ===== 放大查看浮层 ===== */
.preview-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0,0,0,0.88);
  z-index: 1000;
  display: none;
  flex-direction: column;
}

.preview-overlay.active {
  display: flex;
}

.preview-overlay__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  color: white;
  flex-shrink: 0;
}

.preview-overlay__title {
  font-size: 16px;
  font-weight: 600;
}

.preview-overlay__close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.preview-overlay__close:active {
  background: rgba(255,255,255,0.25);
}

.preview-overlay__body {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow: auto;
}

.preview-overlay__placeholder {
  width: 85vw;
  height: 55vh;
  background: #f8f9fa;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 100px;
}

/* 浮层底部信息 */
.preview-overlay__info {
  padding: 8px 16px 12px;
  color: white;
  text-align: center;
  flex-shrink: 0;
}

.preview-overlay__name {
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 4px;
}

.preview-overlay__detail {
  font-size: 13px;
  opacity: 0.75;
}

/* 浮层底部按钮 */
.preview-overlay__footer {
  padding: 0 16px 24px;
  flex-shrink: 0;
}

.preview-overlay__footer .btn {
  width: 100%;
}

/* ===== 底部固定按钮 ===== */
.bottom-actions--fixed {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 375px;
  padding: 12px 16px 24px;
  background: white;
  border-top: 1px solid var(--border);
  z-index: 100;
}

.bottom-actions--fixed .btn {
  width: 100%;
}

.bottom-actions__hint {
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>16:15</span>
    <span>📶 5G 🔋</span>
  </div>

  <header class="app-bar">
    <button class="app-bar__back" onclick="history.back()">←</button>
    <h1 class="app-bar__title">重匹配</h1>
    <div class="app-bar__actions">
      <button class="app-bar__more">⋮</button>
    </div>
  </header>

  <!-- 提示横幅 -->
  <div class="rematch-banner">
    <span class="rematch-banner__icon">💡</span>
    <div>
      <div class="rematch-banner__title">请选择续打起始试卷</div>
      <div class="rematch-banner__desc">点击试卷可放大查看，确认后点击「从此试卷开始打印」</div>
    </div>
  </div>

  <!-- 试卷缩略图网格 -->
  <div class="paper-grid" id="paperGrid"></div>

  <!-- 底部固定按钮 -->
  <div class="bottom-actions bottom-actions--fixed">
    <div class="bottom-actions__hint" id="bottomHint">请点击上方试卷放大查看后选择</div>
    <button class="btn btn--primary" id="confirmBtn" disabled onclick="confirmStart()">从此试卷开始打印</button>
  </div>
</div>

<!-- 放大查看浮层 -->
<div class="preview-overlay" id="previewOverlay" onclick="onOverlayClick(event)">
  <div class="preview-overlay__header">
    <span class="preview-overlay__title" id="previewTitle">试卷预览</span>
    <button class="preview-overlay__close" onclick="closePreview()">✕</button>
  </div>
  <div class="preview-overlay__body" onclick="event.stopPropagation()">
    <div class="preview-overlay__placeholder" id="previewImage">📄</div>
  </div>
  <div class="preview-overlay__info">
    <div class="preview-overlay__name" id="previewName">--</div>
    <div class="preview-overlay__detail" id="previewDetail">--</div>
  </div>
  <div class="preview-overlay__footer">
    <button class="btn btn--primary" onclick="selectFromThis()">从此试卷开始打印</button>
  </div>
</div>

<script>
// 模拟试卷数据
const papers = [
  { id: 1, seq: 1, name: "林晓雨", studentNo: "250501", printed: true, jammed: false },
  { id: 2, seq: 2, name: "陈宇轩", studentNo: "250502", printed: true, jammed: false },
  { id: 3, seq: 3, name: "王思琪", studentNo: "250503", printed: true, jammed: false },
  { id: 4, seq: 4, name: "张浩然", studentNo: "250504", printed: true, jammed: false },
  { id: 5, seq: 5, name: "李欣怡", studentNo: "250505", printed: false, jammed: true },
  { id: 6, seq: 6, name: "刘子墨", studentNo: "250506", printed: false, jammed: false },
  { id: 7, seq: 7, name: "赵雅婷", studentNo: "250507", printed: false, jammed: false },
  { id: 8, seq: 8, name: "周明辉", studentNo: "250508", printed: false, jammed: false },
  { id: 9, seq: 9, name: "孙雨萱", studentNo: "250509", printed: false, jammed: false },
  { id: 10, seq: 10, name: "吴俊杰", studentNo: "250510", printed: false, jammed: false },
];

let selectedStartId = null;
let previewIndex = 0;

function renderGrid() {
  const grid = document.getElementById('paperGrid');
  grid.innerHTML = papers.map((p, idx) => {
    const isSelected = selectedStartId === p.id;
    return `
      <div class="paper-thumb ${isSelected ? 'paper-thumb--selected' : ''}" 
           onclick="openPreview(${idx})" data-id="${p.id}">
        <span class="paper-thumb__seq">${p.seq}</span>
        <div class="paper-thumb__image">📄</div>
        ${isSelected ? '<span class="paper-thumb__check">✓</span>' : ''}
      </div>
    `;
  }).join('');
}

function openPreview(index) {
  previewIndex = index;
  const paper = papers[index];
  
  // 点击即选中该试卷
  selectedStartId = paper.id;
  renderGrid();
  updateBottomButton();
  
  document.getElementById('previewTitle').textContent = `第 ${paper.seq} 张`;
  document.getElementById('previewName').textContent = paper.name;
  
  let detailText = `学号：${paper.studentNo}`;
  if (paper.jammed) detailText += ' · 卡纸，需重新打印';
  else if (paper.printed) detailText += ' · 已打印';
  else detailText += ' · 待打印';
  document.getElementById('previewDetail').textContent = detailText;
  
  document.getElementById('previewOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closePreview() {
  document.getElementById('previewOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function onOverlayClick(event) {
  if (event.target === document.getElementById('previewOverlay')) {
    closePreview();
  }
}

function selectFromThis() {
  const paper = papers[previewIndex];
  selectedStartId = paper.id;
  closePreview();
  renderGrid();
  updateBottomButton();
}

function updateBottomButton() {
  const btn = document.getElementById('confirmBtn');
  const hint = document.getElementById('bottomHint');
  
  if (selectedStartId) {
    const paper = papers.find(p => p.id === selectedStartId);
    btn.disabled = false;
    hint.textContent = `已选择：第 ${paper.seq} 张 · ${paper.name}，将从该试卷开始续打`;
    hint.style.color = 'var(--primary)';
  } else {
    btn.disabled = true;
    hint.textContent = '请点击上方试卷放大查看后选择';
    hint.style.color = 'var(--text-secondary)';
  }
}

function confirmStart() {
  if (!selectedStartId) return;
  const paper = papers.find(p => p.id === selectedStartId);
  // 跳转到续打确认页，带入起始序号
  window.location.href = `confirm-print.html?startSeq=${paper.seq}`;
}

// 初始化
renderGrid();
updateBottomButton();
</script>

</body>
</html>
