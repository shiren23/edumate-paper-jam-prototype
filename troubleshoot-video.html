<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卡纸排障视频</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ====== 品牌选择页 ====== */
.brand-page {
  display: none;
}
.brand-page--active {
  display: block;
}

.brand-intro {
  margin: 16px 16px 0;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.brand-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 16px 24px;
}

.brand-card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s, box-shadow 0.15s;
}

.brand-card:active {
  transform: scale(0.98);
}

.brand-card__icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 28px;
}

.brand-card__name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.brand-card__desc {
  font-size: 12px;
  color: var(--text-tertiary);
}

/* ====== 问题列表页 ====== */
.issue-page {
  display: none;
}
.issue-page--active {
  display: block;
}

.brand-banner {
  margin: 12px 16px 0;
  background: white;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.brand-banner__icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.brand-banner__info {
  flex: 1;
}

.brand-banner__name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}

.brand-banner__desc {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.issue-list {
  margin: 12px 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.issue-item {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}

.issue-item:active {
  background: var(--bg-page);
}

.issue-item__title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.4;
  flex: 1;
}

.issue-item__arrow {
  font-size: 18px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

/* ====== 问题详情页 ====== */
.detail-page {
  display: none;
}
.detail-page--active {
  display: block;
}

.detail-header {
  margin: 12px 16px 0;
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.detail-header__brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.detail-header__badge {
  font-size: 11px;
  color: #6366F1;
  background: rgba(99,102,241,0.1);
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 600;
}

.detail-header__code {
  font-size: 11px;
  color: var(--text-tertiary);
  background: var(--bg-page);
  padding: 2px 8px;
  border-radius: 6px;
}

.detail-header__title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
}

/* 视频区域 */
.video-section {
  margin: 12px 16px 0;
}

.video-player {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #1F2937;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.video-player__play {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(99, 102, 241, 0.9);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  transition: transform 0.15s;
}

.video-player__play:active {
  transform: scale(0.92);
}

.video-player__label {
  position: absolute;
  bottom: 10px;
  left: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.45);
  padding: 3px 10px;
  border-radius: 6px;
}

.video-player--empty {
  background: var(--bg-page);
  border: 1px dashed var(--border);
}

.video-player--empty .video-player__placeholder {
  color: var(--text-tertiary);
  font-size: 14px;
}

/* 图片占位（无视频时显示） */
.image-placeholder {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--bg-page);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 1px dashed var(--border);
}

.image-placeholder__icon {
  font-size: 40px;
  margin-bottom: 8px;
}

.image-placeholder__text {
  font-size: 14px;
  color: var(--text-tertiary);
}

/* 文字解法区 */
.solution-section {
  margin: 12px 16px 24px;
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.solution-section__title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.solution-section__title::before {
  content: '';
  width: 4px;
  height: 16px;
  background: linear-gradient(180deg, #6366F1 0%, #8B5CF6 100%);
  border-radius: 2px;
}

/* 有序步骤列表 */
.steps-list {
  list-style: none;
  padding: 0;
  margin: 0;
  counter-reset: step;
}

.steps-list li {
  position: relative;
  padding-left: 32px;
  padding-bottom: 14px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.steps-list li:last-child {
  padding-bottom: 0;
}

.steps-list li::before {
  counter-increment: step;
  content: counter(step);
  position: absolute;
  left: 0;
  top: 2px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
  color: white;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* 信息框（现象/前提/原因/备注/联系方式/参考） */
.info-box {
  margin-bottom: 14px;
  border-radius: 10px;
  padding: 10px 12px;
}

.info-box:last-child {
  margin-bottom: 0;
}

.info-box__label {
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 4px;
}

.info-box__text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.info-box--phenomenon {
  background: rgba(245, 158, 11, 0.08);
}
.info-box--phenomenon .info-box__label {
  color: #D97706;
}

.info-box--precondition {
  background: rgba(59, 130, 246, 0.08);
}
.info-box--precondition .info-box__label {
  color: #2563EB;
}

.info-box--cause {
  background: rgba(239, 68, 68, 0.08);
}
.info-box--cause .info-box__label {
  color: #DC2626;
}

.info-box--note {
  background: rgba(99, 102, 241, 0.08);
}
.info-box--note .info-box__label {
  color: #6366F1;
}

.info-box--contact {
  background: rgba(16, 185, 129, 0.08);
}
.info-box--contact .info-box__label {
  color: #059669;
}

.info-box--reference {
  background: rgba(107, 114, 128, 0.08);
}
.info-box--reference .info-box__label {
  color: #4B5563;
}

.reference-link {
  color: #6366F1;
  text-decoration: underline;
}
</style>
</head>

// ========== 导航状态 ==========
let currentBrand = null;
let currentIssue = null;
let historyStack = ['brand']; // brand -> issue -> detail

function goBack() {
  if (historyStack.length <= 1) {
    history.back();
    return;
  }
  historyStack.pop();
  const prev = historyStack[historyStack.length - 1];
  if (prev === 'brand') showBrandPage();
  else if (prev === 'issue') showIssuePage();
}

function showPage(pageId) {
  document.querySelectorAll('.brand-page, .issue-page, .detail-page').forEach(p => {
    p.classList.remove('brand-page--active', 'issue-page--active', 'detail-page--active');
  });
  document.getElementById(pageId).classList.add(
    pageId === 'brandPage' ? 'brand-page--active' :
    pageId === 'issuePage' ? 'issue-page--active' : 'detail-page--active'
  );
}

// ========== 第一步：品牌选择 ==========
function selectBrand(brandKey) {
  currentBrand = brandKey;
  const brand = brandData[brandKey];

  // 更新问题页品牌横幅
  document.getElementById('bannerIcon').textContent = brand.icon;
  document.getElementById('bannerName').textContent = brand.name;
  document.getElementById('bannerDesc').textContent = brand.desc + ' · 请选择遇到的问题';

  // 渲染问题列表
  const listEl = document.getElementById('issueList');
  listEl.innerHTML = brand.issues.map((issue, idx) => `
    <div class="issue-item" onclick="selectIssue(${idx})">
      <div class="issue-item__title">${issue.title}</div>
      <div class="issue-item__arrow">›</div>
    </div>
  `).join('');

  historyStack.push('issue');
  showPage('issuePage');
}

// ========== 第二步：问题列表（已在 selectBrand 中渲染） ==========
function showIssuePage() {
  showPage('issuePage');
}

// ========== 第三步：问题详情 ==========
function selectIssue(issueIdx) {
  currentIssue = issueIdx;
  const brand = brandData[currentBrand];
  const issue = brand.issues[issueIdx];

  // 更新标题
  document.getElementById('pageTitle').textContent = issue.title;

  // 更新头部信息
  document.getElementById('detailBrand').textContent = brand.name;
  document.getElementById('detailCode').textContent = issue.code ? `错误代码 ${issue.code}` : issue.codeLabel;
  document.getElementById('detailCode').style.display = 'inline';
  document.getElementById('detailTitle').textContent = issue.title;

  // 更新媒体区：有视频则显示视频播放器，无视频则显示示意图占位
  const videoSection = document.getElementById('videoSection');
  if (issue.hasVideo) {
    videoSection.innerHTML = `
      <div class="video-player">
        <div class="video-player__play">▶</div>
        <div class="video-player__label">${issue.videoLabel || ''}</div>
      </div>
    `;
  } else {
    videoSection.innerHTML = `
      <div class="image-placeholder">
        <div class="image-placeholder__icon">🖼️</div>
        <div class="image-placeholder__text">示意图</div>
      </div>
    `;
  }

  // 构建解法区 HTML
  let html = '';

  // 现象
  if (issue.phenomenon) {
    html += `<div class="info-box info-box--phenomenon"><div class="info-box__label">现象</div><div class="info-box__text">${issue.phenomenon}</div></div>`;
  }

  // 前提
  if (issue.precondition) {
    html += `<div class="info-box info-box--precondition"><div class="info-box__label">前提</div><div class="info-box__text">${issue.precondition}</div></div>`;
  }

  // 原因
  if (issue.cause) {
    html += `<div class="info-box info-box--cause"><div class="info-box__label">原因</div><div class="info-box__text">${issue.cause}</div></div>`;
  }

  // 步骤
  if (issue.steps && issue.steps.length > 0) {
    html += `<ol class="steps-list">${issue.steps.map(s => `<li>${s}</li>`).join('')}</ol>`;
  }

  // 备注
  if (issue.note) {
    html += `<div class="info-box info-box--note"><div class="info-box__label">备注</div><div class="info-box__text">${issue.note}</div></div>`;
  }

  // 联系方式
  if (issue.contact) {
    html += `<div class="info-box info-box--contact"><div class="info-box__label">厂商联系方式</div><div class="info-box__text">${issue.contact}</div></div>`;
  }

  // 参考链接
  if (issue.reference) {
    html += `<div class="info-box info-box--reference"><div class="info-box__label">参考</div><div class="info-box__text"><a href="${issue.reference}" target="_blank" class="reference-link">佳能官方卡纸修复指南</a></div></div>`;
  }

  document.getElementById('solutionContent').innerHTML = html;

  historyStack.push('detail');
  showPage('detailPage');
}

function showBrandPage() {
  document.getElementById('pageTitle').textContent = '卡纸排障视频';
  showPage('brandPage');
}
</script>

</body>
</html>
