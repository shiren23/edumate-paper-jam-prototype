<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卡纸排障视频</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ====== 品牌选择页 ====== */
.brand-page {
  display: none;
}
.brand-page--active {
  display: block;
}

.brand-intro {
  margin: 16px 16px 0;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.brand-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 16px 16px 24px;
}

.brand-card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  padding: 24px 16px;
  text-align: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s, box-shadow 0.15s;
}

.brand-card:active {
  transform: scale(0.98);
}

.brand-card__icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 28px;
}

.brand-card__name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.brand-card__desc {
  font-size: 12px;
  color: var(--text-tertiary);
}

/* ====== 问题列表页 ====== */
.issue-page {
  display: none;
}
.issue-page--active {
  display: block;
}

.brand-banner {
  margin: 12px 16px 0;
  background: white;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.brand-banner__icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--bg-page);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.brand-banner__info {
  flex: 1;
}

.brand-banner__name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}

.brand-banner__desc {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.issue-list {
  margin: 12px 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.issue-item {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}

.issue-item:active {
  background: var(--bg-page);
}

.issue-item__code {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.issue-item__code-label {
  font-size: 10px;
  opacity: 0.85;
}

.issue-item__code-num {
  font-size: 14px;
  font-weight: 700;
}

.issue-item__code--none {
  background: var(--bg-page);
  color: var(--text-tertiary);
}

.issue-item__code--none .issue-item__code-num {
  font-size: 12px;
  font-weight: 600;
}

.issue-item__info {
  flex: 1;
  min-width: 0;
}

.issue-item__title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
}

.issue-item__summary {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
  line-height: 1.4;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.issue-item__arrow {
  font-size: 18px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

/* ====== 问题详情页 ====== */
.detail-page {
  display: none;
}
.detail-page--active {
  display: block;
}

.detail-header {
  margin: 12px 16px 0;
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.detail-header__brand {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}

.detail-header__badge {
  font-size: 11px;
  color: #6366F1;
  background: rgba(99,102,241,0.1);
  padding: 2px 8px;
  border-radius: 6px;
  font-weight: 600;
}

.detail-header__code {
  font-size: 11px;
  color: var(--text-tertiary);
  background: var(--bg-page);
  padding: 2px 8px;
  border-radius: 6px;
}

.detail-header__title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
}

/* 视频区域 */
.video-section {
  margin: 12px 16px 0;
}

.video-player {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #1F2937;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.video-player__play {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(99, 102, 241, 0.9);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  transition: transform 0.15s;
}

.video-player__play:active {
  transform: scale(0.92);
}

.video-player__label {
  position: absolute;
  bottom: 10px;
  left: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.45);
  padding: 3px 10px;
  border-radius: 6px;
}

.video-player--empty {
  background: var(--bg-page);
  border: 1px dashed var(--border);
}

.video-player--empty .video-player__placeholder {
  color: var(--text-tertiary);
  font-size: 14px;
}

/* 文字解法区 */
.solution-section {
  margin: 12px 16px 24px;
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.solution-section__title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.solution-section__title::before {
  content: '';
  width: 4px;
  height: 16px;
  background: linear-gradient(180deg, #6366F1 0%, #8B5CF6 100%);
  border-radius: 2px;
}

/* 有序步骤列表 */
.steps-list {
  list-style: none;
  padding: 0;
  margin: 0;
  counter-reset: step;
}

.steps-list li {
  position: relative;
  padding-left: 32px;
  padding-bottom: 14px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.steps-list li:last-child {
  padding-bottom: 0;
}

.steps-list li::before {
  counter-increment: step;
  content: counter(step);
  position: absolute;
  left: 0;
  top: 2px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
  color: white;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

/* 纯文字描述 */
.solution-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.8;
}

/* 提示信息 */
.tip-box {
  margin-top: 12px;
  background: rgba(99,102,241,0.06);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  gap: 8px;
}

.tip-box__icon {
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 1px;
}

.tip-box__text {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>16:20</span>
    <span>📶 5G 🔋</span>
  </div>

  <header class="app-bar">
    <button class="app-bar__back" id="backBtn" onclick="goBack()">←</button>
    <h1 class="app-bar__title" id="pageTitle">卡纸排障视频</h1>
    <div class="app-bar__actions">
      <button class="app-bar__more">⋮</button>
    </div>
  </header>

  <!-- ========== 第一步：选择品牌 ========== -->
  <div class="brand-page brand-page--active" id="brandPage">
    <div class="brand-intro">
      请选择您使用的打印机品牌，查看对应的排障视频与操作步骤。
    </div>
    <div class="brand-grid">
      <div class="brand-card" onclick="selectBrand('hantu')">
        <div class="brand-card__icon">🖨️</div>
        <div class="brand-card__name">汉图（极印）</div>
        <div class="brand-card__desc">XA356DNL 等型号</div>
      </div>
      <div class="brand-card" onclick="selectBrand('canon')">
        <div class="brand-card__icon">🖨️</div>
        <div class="brand-card__name">佳能 Canon</div>
        <div class="brand-card__desc">激光打印机系列</div>
      </div>
    </div>
  </div>

  <!-- ========== 第二步：问题列表 ========== -->
  <div class="issue-page" id="issuePage">
    <div class="brand-banner" id="brandBanner">
      <div class="brand-banner__icon" id="bannerIcon">🖨️</div>
      <div class="brand-banner__info">
        <div class="brand-banner__name" id="bannerName">汉图（极印）</div>
        <div class="brand-banner__desc" id="bannerDesc">请选择遇到的问题</div>
      </div>
    </div>
    <div class="issue-list" id="issueList">
      <!-- 动态填充 -->
    </div>
  </div>

  <!-- ========== 第三步：问题详情 ========== -->
  <div class="detail-page" id="detailPage">
    <div class="detail-header" id="detailHeader">
      <div class="detail-header__brand">
        <span class="detail-header__badge" id="detailBrand">汉图</span>
        <span class="detail-header__code" id="detailCode">错误代码 5407</span>
      </div>
      <div class="detail-header__title" id="detailTitle">汉图卡纸</div>
    </div>

    <div class="video-section" id="videoSection">
      <!-- 动态填充 -->
    </div>

    <div class="solution-section">
      <div class="solution-section__title">排障解法</div>
      <div id="solutionContent">
        <!-- 动态填充：步骤列表或文字描述 -->
      </div>
    </div>
  </div>
</div>

<script>
// ========== 数据 ==========
const brandData = {
  hantu: {
    name: '汉图（极印）',
    desc: 'XA356DNL 等型号',
    icon: '🖨️',
    issues: [
      {
        code: '5407',
        codeLabel: '错误',
        title: '汉图卡纸',
        summary: '打开前盖板，抽出耗材组件；取出自动进纸盒，打开双面打印组件；打开后盖板，左右同时按下压力解除把手；依次检查是否有卡纸；如是，小心取出卡纸。',
        videoLabel: '02:30',
        hasVideo: true,
        steps: [
          '打开前盖板，抽出耗材组件；',
          '取出自动进纸盒，打开双面打印组件；',
          '打开后盖板，左右同时按下压力解除把手；',
          '依次检查是否有卡纸；如是，小心取出卡纸。'
        ],
        description: null
      },
      {
        code: '5503',
        codeLabel: '错误',
        title: '后盖板处异常',
        summary: '请确认后盖板是否打开，并检查是否有卡纸，如是，清除卡纸后，关闭后盖板。',
        videoLabel: '01:15',
        hasVideo: true,
        steps: [],
        description: '请确认后盖板是否打开，并检查是否有卡纸，如是，清除卡纸后，关闭后盖板。'
      },
      {
        code: null,
        codeLabel: '故障',
        title: '扫描试卷失败',
        summary: '创建任务时迪迪智批提示扫描失败或打印机繁忙，请稍后再试。打印机显示屏一直在loading状态',
        videoLabel: null,
        hasVideo: false,
        steps: [],
        description: '创建任务时迪迪智批提示扫描失败或打印机繁忙，请稍后再试。打印机显示屏一直在loading状态'
      }
    ]
  },
  canon: {
    name: '佳能 Canon',
    desc: '激光打印机系列',
    icon: '🖨️',
    issues: [
      {
        code: null,
        codeLabel: '卡纸',
        title: '卡纸修复操作',
        summary: '佳能打印机卡纸修复操作流程。',
        videoLabel: '03:00',
        hasVideo: true,
        steps: [],
        description: '更多详细操作请参考佳能官方文档：https://oip.manual.canon/USRMA-7188-zz-SSM-750-zhCN/contents/devu-trb-papers_jam.html'
      }
    ]
  }
};

// ========== 导航状态 ==========
let currentBrand = null;
let currentIssue = null;
let historyStack = ['brand']; // brand -> issue -> detail

function goBack() {
  if (historyStack.length <= 1) {
    history.back();
    return;
  }
  historyStack.pop();
  const prev = historyStack[historyStack.length - 1];
  if (prev === 'brand') showBrandPage();
  else if (prev === 'issue') showIssuePage();
}

function showPage(pageId) {
  document.querySelectorAll('.brand-page, .issue-page, .detail-page').forEach(p => {
    p.classList.remove('brand-page--active', 'issue-page--active', 'detail-page--active');
  });
  document.getElementById(pageId).classList.add(
    pageId === 'brandPage' ? 'brand-page--active' :
    pageId === 'issuePage' ? 'issue-page--active' : 'detail-page--active'
  );
}

// ========== 第一步：品牌选择 ==========
function selectBrand(brandKey) {
  currentBrand = brandKey;
  const brand = brandData[brandKey];

  // 更新问题页品牌横幅
  document.getElementById('bannerIcon').textContent = brand.icon;
  document.getElementById('bannerName').textContent = brand.name;
  document.getElementById('bannerDesc').textContent = brand.desc + ' · 请选择遇到的问题';

  // 渲染问题列表
  const listEl = document.getElementById('issueList');
  listEl.innerHTML = brand.issues.map((issue, idx) => `
    <div class="issue-item" onclick="selectIssue(${idx})">
      <div class="issue-item__code ${issue.code ? '' : 'issue-item__code--none'}">
        <div class="issue-item__code-label">${issue.codeLabel}</div>
        <div class="issue-item__code-num">${issue.code || '—'}</div>
      </div>
      <div class="issue-item__info">
        <div class="issue-item__title">${issue.title}</div>
        <div class="issue-item__summary">${issue.summary}</div>
      </div>
      <div class="issue-item__arrow">›</div>
    </div>
  `).join('');

  historyStack.push('issue');
  showPage('issuePage');
}

// ========== 第二步：问题列表（已在 selectBrand 中渲染） ==========
function showIssuePage() {
  showPage('issuePage');
}

// ========== 第三步：问题详情 ==========
function selectIssue(issueIdx) {
  currentIssue = issueIdx;
  const brand = brandData[currentBrand];
  const issue = brand.issues[issueIdx];

  // 更新标题
  document.getElementById('pageTitle').textContent = issue.title;

  // 更新头部信息
  document.getElementById('detailBrand').textContent = brand.name;
  document.getElementById('detailCode').textContent = issue.code ? `错误代码 ${issue.code}` : '常见故障';
  document.getElementById('detailCode').style.display = issue.code ? 'inline' : 'none';
  document.getElementById('detailTitle').textContent = issue.title;

  // 更新视频区
  const videoSection = document.getElementById('videoSection');
  if (issue.hasVideo) {
    videoSection.innerHTML = `
      <div class="video-player">
        <div class="video-player__play">▶</div>
        <div class="video-player__label">${issue.videoLabel}</div>
      </div>
    `;
  } else {
    videoSection.innerHTML = `
      <div class="video-player video-player--empty">
        <div class="video-player__placeholder">📹 视频上传中...</div>
      </div>
    `;
  }

  // 更新解法区：有步骤则显示步骤列表，无步骤则显示文字描述
  const solutionContent = document.getElementById('solutionContent');
  if (issue.steps && issue.steps.length > 0) {
    solutionContent.innerHTML = `<ol class="steps-list">${issue.steps.map(s => `<li>${s}</li>`).join('')}</ol>`;
  } else if (issue.description) {
    solutionContent.innerHTML = `<div class="solution-desc">${issue.description}</div>`;
  } else {
    solutionContent.innerHTML = '';
  }

  historyStack.push('detail');
  showPage('detailPage');
}

function showBrandPage() {
  document.getElementById('pageTitle').textContent = '卡纸排障视频';
  showPage('brandPage');
}
</script>

</body>
</html>
