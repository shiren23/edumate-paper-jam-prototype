<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>故障排除手册</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
  background: var(--bg-page);
  max-width: 720px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 60px;
}

/* 顶部导航 */
.web-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  padding: 0 16px;
  background: var(--bg-page);
  position: sticky;
  top: 0;
  z-index: 10;
}

.web-header__back {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none;
  font-size: 20px; color: var(--text-primary);
  cursor: pointer; border-radius: 50%;
}

.web-header__back:hover {
  background: var(--border);
}

.web-header__title {
  font-size: 18px; font-weight: 600;
  position: absolute; left: 50%; transform: translateX(-50%);
}

/* 页面引导 */
.page-intro {
  margin: 16px 16px 0;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* 列表页 / 详情页 */
.list-page { display: none; }
.list-page--active { display: block; }

.detail-page { display: none; }
.detail-page--active { display: block; }

/* 分类列表 */
.category-list {
  margin: 12px 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.category-item {
  background: white;
  border-radius: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  overflow: hidden;
}

/* 分类头部 */
.category-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
  gap: 12px;
}

.category-header:hover {
  background: var(--bg-page);
}

.category-header--open {
  background: var(--bg-page);
}

.category-header__left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
}

.category-header__icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--bg-page);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
}

.category-header__name {
  font-size: 16px; font-weight: 600;
  color: var(--text-primary);
  line-height: 1.4;
}

.category-header__count {
  font-size: 13px; color: var(--text-secondary);
  margin-top: 2px;
}

.category-header__arrow {
  font-size: 14px;
  color: var(--text-tertiary);
  transition: transform 0.25s ease;
  flex-shrink: 0;
}

.category-header__arrow--open {
  transform: rotate(180deg);
}

/* 分类展开体 */
.category-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

.category-body--open {
  max-height: 800px;
}

/* 问题列表 */
.issue-list {
  padding: 0 18px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.issue-item {
  background: var(--bg-page);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s;
}

.issue-item:hover {
  background: #E5E7EB;
}

.issue-item__title {
  font-size: 15px; font-weight: 500;
  color: var(--text-primary);
  line-height: 1.4;
  flex: 1;
}

.issue-item__arrow {
  font-size: 18px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

/* 分隔线 */
.category-divider {
  height: 1px;
  background: var(--border);
  margin: 8px 16px;
}

/* 问题详情页 */
.detail-header {
  margin: 12px 16px 0;
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.detail-header__brand {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
}

.detail-header__badge {
  font-size: 11px; color: #6366F1;
  background: rgba(99,102,241,0.1);
  padding: 2px 8px; border-radius: 6px;
  font-weight: 600;
}

.detail-header__code {
  font-size: 11px; color: var(--text-tertiary);
  background: var(--bg-page);
  padding: 2px 8px; border-radius: 6px;
}

.detail-header__title {
  font-size: 17px; font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
}

/* 媒体区 */
.media-section {
  margin: 12px 16px 0;
}

.video-player {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #1F2937;
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.video-player__play {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: rgba(99, 102, 241, 0.9);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; cursor: pointer;
  transition: transform 0.15s;
}

.video-player__play:hover {
  transform: scale(1.05);
}

.video-player__label {
  position: absolute;
  bottom: 10px; left: 12px;
  font-size: 12px; color: rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.45);
  padding: 3px 10px; border-radius: 6px;
}

.image-placeholder {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--bg-page);
  border-radius: 16px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 1px dashed var(--border);
}

.image-placeholder__icon {
  font-size: 40px;
  margin-bottom: 8px;
}

.image-placeholder__text {
  font-size: 14px;
  color: var(--text-tertiary);
}

/* 解法区 */
.solution-section {
  margin: 12px 16px 24px;
  background: white;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.solution-section__title {
  font-size: 15px; font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}

.solution-section__title::before {
  content: '';
  width: 4px; height: 16px;
  background: linear-gradient(180deg, #6366F1 0%, #8B5CF6 100%);
  border-radius: 2px;
}

/* 有序步骤 */
.steps-list {
  list-style: none;
  padding: 0; margin: 0;
  counter-reset: step;
}

.steps-list li {
  position: relative;
  padding-left: 32px;
  padding-bottom: 14px;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
}

.steps-list li:last-child {
  padding-bottom: 0;
}

.steps-list li::before {
  counter-increment: step;
  content: counter(step);
  position: absolute;
  left: 0; top: 2px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
  color: white;
  font-size: 12px; font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 信息框 */
.info-box {
  margin-bottom: 14px;
  border-radius: 10px;
  padding: 10px 12px;
}

.info-box:last-child {
  margin-bottom: 0;
}

.info-box__label {
  font-size: 12px; font-weight: 600;
  margin-bottom: 4px;
}

.info-box__text {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.info-box--phenomenon { background: rgba(245, 158, 11, 0.08); }
.info-box--phenomenon .info-box__label { color: #D97706; }

.info-box--precondition { background: rgba(59, 130, 246, 0.08); }
.info-box--precondition .info-box__label { color: #2563EB; }

.info-box--cause { background: rgba(239, 68, 68, 0.08); }
.info-box--cause .info-box__label { color: #DC2626; }

.info-box--note { background: rgba(99, 102, 241, 0.08); }
.info-box--note .info-box__label { color: #6366F1; }

.info-box--contact { background: rgba(16, 185, 129, 0.08); }
.info-box--contact .info-box__label { color: #059669; }

.info-box--reference { background: rgba(107, 114, 128, 0.08); }
.info-box--reference .info-box__label { color: #4B5563; }

.reference-link {
  color: #6366F1;
  text-decoration: underline;
}
</style>
</head>
<body>

<!-- 顶部导航 -->
<header class="web-header" id="webHeader">
  <button class="web-header__back" id="backBtn" onclick="goBack()">←</button>
  <h1 class="web-header__title" id="pageTitle">故障排除手册</h1>
  <div style="width:40px;"></div>
</header>

<!-- ========== 列表页 ========== -->
<div class="list-page list-page--active" id="listPage">
  <div class="page-intro">
    点击下方分类可展开查看问题列表，点击问题查看排障步骤。
  </div>

  <div class="category-list" id="categoryList"></div>
</div>

<!-- ========== 详情页 ========== -->
<div class="detail-page" id="detailPage">
  <div class="detail-header" id="detailHeader">
    <div class="detail-header__brand">
      <span class="detail-header__badge" id="detailBrand">汉图打印机故障</span>
      <span class="detail-header__code" id="detailCode">错误代码 5407</span>
    </div>
    <div class="detail-header__title" id="detailTitle">卡纸</div>
  </div>

  <div class="media-section" id="mediaSection"></div>

  <div class="solution-section">
    <div class="solution-section__title">排障解法</div>
    <div id="solutionContent"></div>
  </div>
</div>

<script>
const brandData = {
  hantu: {
    name: '汉图打印机故障',
    icon: '🖨️',
    issues: [
      {
        id: 'h-1',
        code: null,
        codeLabel: '故障',
        title: '搜索不到打印机',
        hasVideo: false,
        precondition: '打印机和手机在同一个 WiFi，打印机网络指示灯正常',
        steps: [
          '打开手机设置',
          '找到微信 → 打开本地网络权限',
          '返回小程序，重新搜索打印机'
        ]
      },
      {
        id: 'h-2',
        code: '5407',
        codeLabel: '错误',
        title: '卡纸',
        hasVideo: true,
        steps: [
          '打开打印机前门',
          '打开打印机后门',
          '把硒鼓和碳粉盒拿出来',
          '仔细检查内部是否有卡纸或异物',
          '清理干净后，装回硒鼓碳粉，关闭前后门'
        ]
      },
      {
        id: 'h-3',
        code: null,
        codeLabel: '故障',
        title: '留痕打印时卡纸',
        hasVideo: false,
        steps: [
          '拉开纸盒，取出尚未打印的试卷',
          '放入空白打印纸，关闭纸盒',
          '按照上述步骤，清理卡纸',
          '待打印机重新开始打印后，等待打印完成，或取消打印任务',
          '将未打印的试卷重新扫描批改并打印'
        ]
      },
      {
        id: 'h-4',
        code: null,
        codeLabel: '故障',
        title: '扫描试卷失败 / 打印机繁忙',
        hasVideo: false,
        phenomenon: '小程序提示"扫描失败"或"打印机繁忙"，打印机屏幕一直转圈 loading',
        steps: [
          '打印机关机，等几秒再开机',
          '小程序退出到首页',
          '重新点击"智能批阅"，重新创建任务'
        ]
      },
      {
        id: 'h-5',
        code: '5503',
        codeLabel: '错误',
        title: '后盖板异常',
        hasVideo: true,
        steps: [
          '查看打印机后盖板是否打开',
          '检查里面是否有卡纸，有就轻轻拉出来',
          '关闭后盖板'
        ],
        note: '若纸捏不出来或机器一直报警，可联系厂商处理',
        contact: '400-088-8253（上海汉图，每日 8:00-20:00）'
      },
      {
        id: 'h-6',
        code: null,
        codeLabel: '故障',
        title: '连接打印机失败（硒鼓/墨粉报错）',
        hasVideo: false,
        phenomenon: '打印机显示墨粉或硒鼓异常',
        steps: [
          '打开打印机前盖板',
          '把硒鼓拉出来',
          '重新安装硒鼓，确保卡到位',
          '关闭前盖板',
          '查看屏幕上的墨粉/硒鼓报错是否消失',
          '报错消失后，重新连接打印机'
        ]
      }
    ]
  },
  canon: {
    name: '佳能打印机故障',
    icon: '🖨️',
    issues: [
      {
        id: 'c-1',
        code: null,
        codeLabel: '故障',
        title: '前盖板处卡纸',
        hasVideo: true,
        cause: '纸张放太多、纸张褶皱',
        steps: [
          '打开打印机前盖板',
          '把卡住的纸张轻轻抽出来',
          '关闭前盖板'
        ],
        reference: 'https://oip.manual.canon/USRMA-7188-zz-SSM-750-zhCN/contents/devu-trb-papers_jam.html'
      },
      {
        id: 'c-2',
        code: null,
        codeLabel: '故障',
        title: '后盖板处卡纸',
        hasVideo: true,
        steps: [
          '打开打印机后盖板',
          '把卡住的纸张轻轻抽出来',
          '关闭后盖板'
        ]
      },
      {
        id: 'c-3',
        code: null,
        codeLabel: '故障',
        title: '留痕打印时卡纸',
        hasVideo: false,
        steps: [
          '拉开纸盒，取出尚未打印的试卷',
          '放入空白打印纸，关闭纸盒',
          '按照上述步骤，清理卡纸',
          '待打印机重新开始打印后，等待打印完成，或取消打印任务',
          '将未打印的试卷重新扫描批改并打印'
        ]
      }
    ]
  },
  miniprogram: {
    name: '小程序问题',
    icon: '📱',
    issues: [
      {
        id: 'm-1',
        code: null,
        codeLabel: '问题',
        title: '智能批阅不显示班级',
        hasVideo: false,
        steps: [
          '不要从其他入口进，先回到小程序首页',
          '直接点击首页上的"智能批阅"按钮',
          '弹出登录窗口后正常登录',
          '再进入创建任务页面，班级信息就会显示'
        ]
      }
    ]
  }
};

const brandList = [
  { key: 'hantu', ...brandData.hantu },
  { key: 'canon', ...brandData.canon },
  { key: 'miniprogram', ...brandData.miniprogram }
];

let step = 'list';
let expanded = { hantu: false, canon: false, miniprogram: false };
let currentIssue = null;
let currentBrandName = '';

function init() {
  const listEl = document.getElementById('categoryList');
  listEl.innerHTML = brandList.map(brand => `
    <div class="category-item">
      <div class="category-header" id="header-${brand.key}" onclick="toggleBrand('${brand.key}')">
        <div class="category-header__left">
          <div class="category-header__icon">${brand.icon}</div>
          <div>
            <div class="category-header__name">${brand.name}</div>
            <div class="category-header__count">${brand.issues.length} 个常见问题</div>
          </div>
        </div>
        <div class="category-header__arrow" id="arrow-${brand.key}">▼</div>
      </div>
      <div class="category-body" id="body-${brand.key}">
        <div class="issue-list">
          ${brand.issues.map((issue, idx) => `
            <div class="issue-item" onclick="selectIssue('${brand.key}', ${idx})">
              <div class="issue-item__title">${issue.title}</div>
              <div class="issue-item__arrow">›</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function showPage(pageName) {
  document.querySelectorAll('.list-page, .detail-page').forEach(p => {
    p.classList.remove('list-page--active', 'detail-page--active');
  });
  if (pageName === 'list') {
    document.getElementById('listPage').classList.add('list-page--active');
    document.getElementById('pageTitle').textContent = '故障排除手册';
  } else {
    document.getElementById('detailPage').classList.add('detail-page--active');
  }
}

function toggleBrand(key) {
  const body = document.getElementById(`body-${key}`);
  const arrow = document.getElementById(`arrow-${key}`);
  const header = document.getElementById(`header-${key}`);
  const isOpen = body.classList.contains('category-body--open');

  if (isOpen) {
    body.classList.remove('category-body--open');
    arrow.classList.remove('category-header__arrow--open');
    header.classList.remove('category-header--open');
    expanded[key] = false;
  } else {
    body.classList.add('category-body--open');
    arrow.classList.add('category-header__arrow--open');
    header.classList.add('category-header--open');
    expanded[key] = true;
  }
}

function selectIssue(brandKey, issueIdx) {
  event.stopPropagation();
  const brand = brandData[brandKey];
  const issue = brand.issues[issueIdx];
  currentIssue = issue;
  currentBrandName = brand.name;

  document.getElementById('pageTitle').textContent = issue.title;
  document.getElementById('detailBrand').textContent = brand.name;
  document.getElementById('detailCode').textContent = issue.code ? `错误代码 ${issue.code}` : issue.codeLabel;
  document.getElementById('detailCode').style.display = 'inline';
  document.getElementById('detailTitle').textContent = issue.title;

  const mediaSection = document.getElementById('mediaSection');
  if (issue.hasVideo) {
    mediaSection.innerHTML = `
      <div class="video-player">
        <div class="video-player__play">▶</div>
      </div>
    `;
  } else {
    mediaSection.innerHTML = `
      <div class="image-placeholder">
        <div class="image-placeholder__icon">🖼️</div>
        <div class="image-placeholder__text">示意图</div>
      </div>
    `;
  }

  let html = '';
  if (issue.phenomenon) {
    html += `<div class="info-box info-box--phenomenon"><div class="info-box__label">现象</div><div class="info-box__text">${issue.phenomenon}</div></div>`;
  }
  if (issue.precondition) {
    html += `<div class="info-box info-box--precondition"><div class="info-box__label">前提</div><div class="info-box__text">${issue.precondition}</div></div>`;
  }
  if (issue.cause) {
    html += `<div class="info-box info-box--cause"><div class="info-box__label">原因</div><div class="info-box__text">${issue.cause}</div></div>`;
  }
  if (issue.steps && issue.steps.length > 0) {
    html += `<ol class="steps-list">${issue.steps.map(s => `<li>${s}</li>`).join('')}</ol>`;
  }
  if (issue.note) {
    html += `<div class="info-box info-box--note"><div class="info-box__label">备注</div><div class="info-box__text">${issue.note}</div></div>`;
  }
  if (issue.contact) {
    html += `<div class="info-box info-box--contact"><div class="info-box__label">厂商联系方式</div><div class="info-box__text">${issue.contact}</div></div>`;
  }
  if (issue.reference) {
    html += `<div class="info-box info-box--reference"><div class="info-box__label">参考</div><div class="info-box__text"><a href="${issue.reference}" target="_blank" class="reference-link">佳能官方卡纸修复指南</a></div></div>`;
  }

  document.getElementById('solutionContent').innerHTML = html;

  step = 'detail';
  showPage('detail');
  window.scrollTo(0, 0);
}

function goBack() {
  if (step === 'detail') {
    step = 'list';
    showPage('list');
    window.scrollTo(0, 0);
  } else {
    window.location.href = 'index.html';
  }
}

init();
</script>

</body>
</html>
