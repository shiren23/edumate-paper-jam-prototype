<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>留痕打印</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ===== 扫描设备 ===== */
.device-section__header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 16px 12px;
}

.device-section__title {
  font-size: 16px;
  font-weight: 600;
}

.device-section__action {
  font-size: 14px;
  color: var(--primary);
  font-weight: 500;
}

.device-card {
  margin: 0 16px 16px;
  background: white;
  border-radius: 16px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.device-card__icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--primary-fade);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.device-card__info { flex: 1; }

.device-card__name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.device-card__ip {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 3px;
}

.device-card__status {
  font-size: 14px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.device-card__status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--success);
}

/* ===== 打印范围 ===== */
.range-section__title {
  font-size: 16px;
  font-weight: 600;
  padding: 16px 16px 12px;
}

.range-card {
  margin: 0 16px 16px;
  background: white;
  border-radius: 16px;
  padding: 20px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.range-card__label {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.range-inputs {
  display: flex;
  align-items: center;
  gap: 12px;
}

.range-input-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-page);
  border-radius: 12px;
  padding: 0 14px;
  height: 48px;
}

.range-input-wrap__label {
  font-size: 14px;
  color: var(--text-secondary);
  white-space: nowrap;
}

.range-input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  text-align: center;
  width: 60px;
  outline: none;
  -moz-appearance: textfield;
}

.range-input::-webkit-outer-spin-button,
.range-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.range-input::placeholder {
  color: var(--text-tertiary);
  font-weight: 400;
}

.range-divider {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-tertiary);
}

.range-summary {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--border);
  font-size: 13px;
  color: var(--text-secondary);
  text-align: center;
}

.range-summary strong {
  color: var(--primary);
  font-weight: 600;
}

/* ===== 留痕内容 ===== */
.content-section__title {
  font-size: 16px;
  font-weight: 600;
  padding: 16px 16px 12px;
}

.content-list {
  margin: 0 16px 16px;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.content-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.content-item:last-child { border-bottom: none; }

.content-item__check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: transparent;
  flex-shrink: 0;
  transition: all 0.15s;
}

.content-item--checked .content-item__check {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.content-item__info { flex: 1; }

.content-item__title {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
}

.content-item__desc {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 3px;
}

/* ===== 底部操作栏 ===== */
.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 375px;
  padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
  background: white;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 100;
}

.bottom-bar__select-all {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  flex-shrink: 0;
}

.bottom-bar__check {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: transparent;
  transition: all 0.15s;
}

.bottom-bar__check--checked {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.bottom-bar__text {
  font-size: 14px;
  font-weight: 500;
}

.bottom-bar__btn {
  flex: 1;
  height: 48px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 9999px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}

.bottom-bar__btn:active {
  transform: scale(0.97);
  background: var(--primary-600);
}

.bottom-bar__btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.bottom-bar__btn:disabled:active {
  transform: none;
}
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>16:08</span>
    <span>📶 5G 🔋</span>
  </div>

  <header class="app-bar">
    <button class="app-bar__back" onclick="history.back()">←</button>
    <h1 class="app-bar__title">留痕打印</h1>
    <div class="app-bar__actions">
      <button class="app-bar__more">⋮</button>
    </div>
  </header>

  <!-- 扫描设备 -->
  <div class="device-section__header">
    <span class="device-section__title">扫描设备</span>
    <span class="device-section__action">更换设备</span>
  </div>
  <div class="device-card">
    <div class="device-card__icon">🖨️</div>
    <div class="device-card__info">
      <div class="device-card__name">UNI A356DNL</div>
      <div class="device-card__ip">IP: 10.158.192.45</div>
    </div>
    <div class="device-card__status">
      <span class="device-card__status-dot"></span>
      打印机就绪
    </div>
  </div>

  <!-- 打印范围 -->
  <div class="range-section__title">打印范围</div>
  <div class="range-card">
    <div class="range-card__label">请输入需要打印的试卷页码范围</div>
    <div class="range-inputs">
      <div class="range-input-wrap">
        <span class="range-input-wrap__label">从</span>
        <input type="number" class="range-input" id="startPage" value="5" min="1" max="37">
        <span class="range-input-wrap__label">页</span>
      </div>
      <span class="range-divider">~</span>
      <div class="range-input-wrap">
        <span class="range-input-wrap__label">到</span>
        <input type="number" class="range-input" id="endPage" value="37" min="1" max="37">
        <span class="range-input-wrap__label">页</span>
      </div>
    </div>
    <div class="range-summary">
      共 <strong id="totalPages">33</strong> 页 · 第 <strong>5</strong> 页（李欣怡） 至 第 <strong>37</strong> 页（郑雅文）
    </div>
  </div>

  <!-- 留痕内容 -->
  <div class="content-section__title">留痕内容</div>
  <div class="content-list">
    <div class="content-item content-item--checked" onclick="toggleItem(this)">
      <div class="content-item__check">✓</div>
      <div class="content-item__info">
        <div class="content-item__title">对错痕迹</div>
        <div class="content-item__desc">标记每题对错状态</div>
      </div>
    </div>
    <div class="content-item" onclick="toggleItem(this)">
      <div class="content-item__check"></div>
      <div class="content-item__info">
        <div class="content-item__title">整卷正确率</div>
        <div class="content-item__desc">在试卷右上角显示整卷答题正确率</div>
      </div>
    </div>
    <div class="content-item" onclick="toggleItem(this)">
      <div class="content-item__check"></div>
      <div class="content-item__info">
        <div class="content-item__title">错误步骤痕迹</div>
        <div class="content-item__desc">标记错误解题步骤</div>
      </div>
    </div>
  </div>

  <!-- 底部操作栏 -->
  <div class="bottom-bar">
    <div class="bottom-bar__select-all" onclick="toggleSelectAll()">
      <div class="bottom-bar__check bottom-bar__check--checked" id="selectAllCheck">✓</div>
      <span class="bottom-bar__text">全选</span>
    </div>
    <button class="bottom-bar__btn" onclick="startPrint()">确认打印</button>
  </div>
</div>

<script>
function toggleItem(el) {
  el.classList.toggle('content-item--checked');
  updateSelectAll();
}

function toggleSelectAll() {
  const items = document.querySelectorAll('.content-item');
  const allChecked = Array.from(items).every(i => i.classList.contains('content-item--checked'));
  items.forEach(item => {
    if (allChecked) {
      item.classList.remove('content-item--checked');
    } else {
      item.classList.add('content-item--checked');
    }
  });
  updateSelectAll();
}

function updateSelectAll() {
  const items = document.querySelectorAll('.content-item');
  const allChecked = Array.from(items).every(i => i.classList.contains('content-item--checked'));
  const check = document.getElementById('selectAllCheck');
  if (allChecked) {
    check.classList.add('bottom-bar__check--checked');
    check.textContent = '✓';
  } else {
    check.classList.remove('bottom-bar__check--checked');
    check.textContent = '';
  }
}

// 打印范围输入监听
function updateRange() {
  const start = parseInt(document.getElementById('startPage').value) || 1;
  const end = parseInt(document.getElementById('endPage').value) || 37;
  const total = Math.max(0, end - start + 1);
  document.getElementById('totalPages').textContent = total;
}

document.getElementById('startPage').addEventListener('input', updateRange);
document.getElementById('endPage').addEventListener('input', updateRange);

function startPrint() {
  const start = document.getElementById('startPage').value;
  const end = document.getElementById('endPage').value;
  alert(`开始打印第 ${start} 页到第 ${end} 页`);
}
</script>

</body>
</html>
